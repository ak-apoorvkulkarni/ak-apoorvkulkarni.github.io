<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hosting Page</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <nav>
            <div class="dropdown">
                <button class="dropbtn">All features</button>
            </div>
        </nav>
        
        <section class="performance-metrics">
            <div class="metric">
                <h3>Google Lighthouse</h3>
                <p>97 / 100</p>

                <p>42 ms globally</p>
            </div>
            <div class="metric">
                <h3>Uptime</h3>
                <p>99.992%</p>
            </div>
        </section>
        
        <section class="hosting">
            <h1>Hosting</h1>

            <p>Enjoy reliable, scalable, fast, and secure hosting for your business — managed for you.</p>
            <a href="#" class="cta-button">Get started — it's free</a>

        <footer>
            <a href="#">Learn more about hosting</a>
        </footer>
    </div>

</html>
