<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="Apoorv Kulkarni - Blog about embedded systems, PCB design, IoT, and engineering insights" />
  <meta name="keywords" content="embedded systems blog, PCB design, IoT, engineering, Karlsruhe Institute of Technology" />
  <title>Blog - Apoorv Kulkarni</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.css" rel="stylesheet" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../style.css" />
  <style>
    .blog-header {
      padding: 2rem 0;
      background: var(--container-color);
      border-bottom: 1px solid var(--border-color);
    }
    
    .blog-header__container {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 1rem;
    }
    
    .blog-header__title {
      font-size: var(--h1-font-size);
      font-weight: var(--font-semi-bold);
      color: var(--title-color);
    }
    
    .blog-header__subtitle {
      color: var(--text-color);
      margin-top: 0.5rem;
    }
    
    .back-to-portfolio {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.75rem 1.5rem;
      background: var(--first-color);
      color: white;
      border-radius: 0.5rem;
      text-decoration: none;
      font-weight: var(--font-medium);
      transition: all 0.3s ease;
    }
    
    .back-to-portfolio:hover {
      background: var(--first-color-alt);
      transform: translateY(-2px);
    }
    
    .blog-filters {
      padding: 2rem 0;
      background: var(--body-color);
    }
    
    .blog-filters__container {
      display: flex;
      justify-content: center;
      gap: 1rem;
      flex-wrap: wrap;
    }
    
    .blog-filter {
      padding: 0.5rem 1rem;
      border: 1px solid var(--border-color);
      border-radius: 2rem;
      background: var(--container-color);
      color: var(--text-color);
      cursor: pointer;
      transition: all 0.3s ease;
      font-size: var(--small-font-size);
    }
    
    .blog-filter.active,
    .blog-filter:hover {
      background: var(--first-color);
      color: white;
      border-color: var(--first-color);
    }
    
    .blog-grid {
      padding: 3rem 0;
    }
    
    .blog-grid__container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
      gap: 2rem;
    }
    
    .blog-card {
      background: var(--container-color);
      border-radius: 1rem;
      overflow: hidden;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
      transition: all 0.3s ease;
      border: 1px solid var(--border-color);
    }
    
    .blog-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.15);
    }
    
    .blog-card__image {
      height: 200px;
      background: linear-gradient(135deg, var(--first-color), var(--first-color-alt));
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 3rem;
    }
    
    .blog-card__content {
      padding: 1.5rem;
    }
    
    .blog-card__meta {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 1rem;
      font-size: var(--small-font-size);
      color: var(--text-color-light);
    }
    
    .blog-card__date {
      display: flex;
      align-items: center;
      gap: 0.25rem;
    }
    
    .blog-card__read-time {
      display: flex;
      align-items: center;
      gap: 0.25rem;
    }
    
    .blog-card__title {
      font-size: var(--h3-font-size);
      font-weight: var(--font-semi-bold);
      color: var(--title-color);
      margin-bottom: 0.75rem;
      line-height: 1.3;
    }
    
    .blog-card__excerpt {
      color: var(--text-color);
      margin-bottom: 1rem;
      line-height: 1.6;
    }
    
    .blog-card__tags {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      margin-bottom: 1rem;
    }
    
    .blog-card__tag {
      padding: 0.25rem 0.75rem;
      background: var(--first-color-light);
      color: var(--first-color);
      border-radius: 1rem;
      font-size: var(--smaller-font-size);
      font-weight: var(--font-medium);
    }
    
    .blog-card__link {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      color: var(--first-color);
      font-weight: var(--font-medium);
      text-decoration: none;
      transition: gap 0.3s ease;
    }
    
    .blog-card__link:hover {
      gap: 0.75rem;
    }
    
    .blog-empty {
      text-align: center;
      padding: 4rem 0;
      color: var(--text-color-light);
    }
    
    .blog-empty__icon {
      font-size: 4rem;
      margin-bottom: 1rem;
      opacity: 0.5;
    }
    
    @media screen and (max-width: 768px) {
      .blog-grid__container {
        grid-template-columns: 1fr;
      }
      
      .blog-header__container {
        flex-direction: column;
        text-align: center;
      }
      
      .blog-filters__container {
        justify-content: flex-start;
        overflow-x: auto;
        padding-bottom: 0.5rem;
      }
    }
  </style>
</head>
<body>

  <!-- BLOG HEADER -->
  <header class="blog-header">
    <div class="container">
      <div class="blog-header__container">
        <div>
          <h1 class="blog-header__title" data-en="Blog" data-de="Blog">Blog</h1>
          <p class="blog-header__subtitle" data-en="Thoughts on embedded systems, engineering, and innovation" data-de="Gedanken zu Embedded Systems, Ingenieurwesen und Innovation">Thoughts on embedded systems, engineering, and innovation</p>
        </div>
        
        <div class="nav__actions">
          <div class="lang-switcher" style="display:inline-block;margin-right:1rem;">
            <button class="lang-btn" data-lang="en" aria-label="Switch to English">EN</button>
            <button class="lang-btn" data-lang="de" aria-label="Auf Deutsch umschalten">DE</button>
          </div>
          <button id="dark-toggle" class="theme-toggle" aria-label="Toggle dark mode">
            <i class="fa-solid fa-moon"></i>
          </button>
          <a href="../" class="back-to-portfolio">
            <i class="fa-solid fa-arrow-left"></i>
            <span data-en="Back to Portfolio" data-de="Zurück zum Portfolio">Back to Portfolio</span>
          </a>
        </div>
      </div>
    </div>
  </header>

  <!-- BLOG FILTERS -->
  <section class="blog-filters">
    <div class="container">
      <div class="blog-filters__container">
        <button class="blog-filter active" data-category="all" data-en="All Posts" data-de="Alle Beiträge">All Posts</button>
        <button class="blog-filter" data-category="embedded-systems" data-en="Embedded Systems" data-de="Embedded Systems">Embedded Systems</button>
        <button class="blog-filter" data-category="pcb-design" data-en="PCB Design" data-de="PCB-Design">PCB Design</button>
        <button class="blog-filter" data-category="iot" data-en="IoT" data-de="IoT">IoT</button>
        <button class="blog-filter" data-category="fpga" data-en="FPGA" data-de="FPGA">FPGA</button>
        <button class="blog-filter" data-category="tutorials" data-en="Tutorials" data-de="Tutorials">Tutorials</button>
      </div>
    </div>
  </section>

  <!-- BLOG GRID -->
  <main class="blog-grid">
    <div class="container">
      <div class="blog-grid__container" id="blog-grid">
        <!-- Blog posts will be dynamically loaded here -->
        <div class="blog-empty">
          <div class="blog-empty__icon">
            <i class="fa-solid fa-newspaper"></i>
          </div>
          <h3 data-en="Coming Soon!" data-de="Demnächst verfügbar!">Coming Soon!</h3>
          <p data-en="I'm working on some great content. Check back soon for articles about embedded systems, PCB design, and engineering insights." data-de="Ich arbeite an großartigem Content. Schau bald wieder vorbei für Artikel über Embedded Systems, PCB-Design und Ingenieurwesen.">I'm working on some great content. Check back soon for articles about embedded systems, PCB design, and engineering insights.</p>
        </div>
      </div>
    </div>
  </main>

  <!-- SCRIPTS -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.js"></script>
  <script>
    // Initialize AOS
    AOS.init({ 
      duration: 1000,
      once: true,
      offset: 100
    });

    // Theme toggle functionality
    const themeToggle = document.getElementById('dark-toggle');
    const body = document.body;
    const icon = themeToggle.querySelector('i');

    // Check for saved theme preference or default to light mode
    const currentTheme = localStorage.getItem('theme') || 'light';
    body.setAttribute('data-theme', currentTheme);
    updateThemeIcon(currentTheme);

    themeToggle.addEventListener('click', () => {
      const currentTheme = body.getAttribute('data-theme');
      const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
      
      body.setAttribute('data-theme', newTheme);
      localStorage.setItem('theme', newTheme);
      updateThemeIcon(newTheme);
    });

    function updateThemeIcon(theme) {
      if (theme === 'dark') {
        icon.className = 'fa-solid fa-sun';
      } else {
        icon.className = 'fa-solid fa-moon';
      }
    }

    // Language switcher functionality
    const langSwitcher = document.querySelector('.lang-switcher');
    const langButtons = langSwitcher.querySelectorAll('.lang-btn');

    function setLanguage(lang) {
      // Highlight the active button
      langButtons.forEach(btn => {
        if (btn.getAttribute('data-lang') === lang) {
          btn.classList.add('active');
        } else {
          btn.classList.remove('active');
        }
      });
      // Update all elements with data-en/data-de
      document.querySelectorAll('[data-en]').forEach(el => {
        el.innerHTML = el.getAttribute(`data-${lang}`);
      });
      // Set lang attribute on <html>
      document.documentElement.lang = lang;
      // Save preference
      localStorage.setItem('lang', lang);
    }

    // On click, switch language
    langButtons.forEach(btn => {
      btn.addEventListener('click', () => {
        setLanguage(btn.getAttribute('data-lang'));
      });
    });

    // On page load, set language from localStorage or default to 'en'
    const savedLang = localStorage.getItem('lang') || 'en';
    setLanguage(savedLang);

    // Blog filter functionality
    const blogFilters = document.querySelectorAll('.blog-filter');
    
    blogFilters.forEach(filter => {
      filter.addEventListener('click', () => {
        // Remove active class from all filters
        blogFilters.forEach(f => f.classList.remove('active'));
        // Add active class to clicked filter
        filter.classList.add('active');
        
        const category = filter.getAttribute('data-category');
        filterBlogPosts(category);
      });
    });

    function filterBlogPosts(category) {
      // This function will be used when we have actual blog posts
      // For now, it's just a placeholder
      console.log('Filtering by category:', category);
    }
  </script>

</body>
</html>
